version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: iwacu_db
      POSTGRES_USER: iwacu_user
      POSTGRES_PASSWORD: iwacu_pass
    ports:
      - "5432:5432"
    volumes:
      - iwacu_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iwacu_user -d iwacu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  iwacu_data: